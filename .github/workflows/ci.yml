name: CI

on:
  push:
    branches: [main, dev, fix/audit-remediation]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint (check-only, no auto-fix)
        run: ruff check . --config pyproject.toml


  # ─── Type check (mypy) ──────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install mypy + stubs
        run: pip install mypy types-psycopg2 pydantic
      - name: Run mypy
        run: mypy shared/ api/ config.py --ignore-missing-imports --no-strict-optional

  # ─── Tests (matrix) ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # DATABASE_URL intentionally unset: psycopg2 cannot parse asyncpg:// DSN.
      # database.py automatically falls back to in-memory store when URL is empty.
      API_KEY: "sandbox-test-api-key-12345"
      OPENAI_API_KEY: "sk-unit-test"
      LLM_BACKEND: "openai"
      JWT_SECRET: "test-secret-for-unit-tests-only"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui,dev]"
          # Extra runtime deps required by tests but not in core pyproject.toml extras
          pip install "mcp[cli]>=1.3.0" PyJWT

      - name: Start API server
        run: |
          uvicorn api.app:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for API server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            echo "Waiting... (${i}s)"
            sleep 1
          done
          echo "=== uvicorn startup log ==="
          cat /tmp/uvicorn.log
          echo "ERROR: Server did not start in 20s" && exit 1

      - name: Run unit tests (no LLM)
        run: pytest tests/ -v --tb=short -m "not e2e and not integration" --cov=. --cov-report=xml --cov-report=term-missing
        env:
          TEST_API_BASE: "http://localhost:8000"
          TEST_API_KEY: "sandbox-test-api-key-12345"

      - name: Stop API server
        if: always()
        run: |
          echo "=== uvicorn log ==="
          cat /tmp/uvicorn.log || true
          kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─── E2E Tests (main only or manual dispatch) ───────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 40
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ui,dev]"
          pip install "mcp[cli]>=1.3.0" PyJWT

      - name: Start API server
        run: |
          uvicorn api.app:app --host 0.0.0.0 --port 8000 > /tmp/uvicorn-e2e.log 2>&1 &
          echo $! > /tmp/uvicorn-e2e.pid
        env:
          LLM_BACKEND: "qwen_proxy"
          OPENAI_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.QWEN_API_BASE || 'https://qwen-proxy-bdt6.onrender.com' }}
          MODEL_NAME: ${{ secrets.QWEN_MODEL || 'qwen3-32b' }}
          API_KEY: "sandbox-test-api-key-12345"

      - name: Wait for API server
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== uvicorn startup log ==="
          cat /tmp/uvicorn-e2e.log
          echo "ERROR: Server did not start in 20s" && exit 1

      - name: Run E2E tests
        run: pytest tests/ -m e2e -v --tb=short
        env:
          TEST_API_BASE: "http://localhost:8000"
          TEST_API_KEY: "sandbox-test-api-key-12345"
          API_KEY: "sandbox-test-api-key-12345"
          LLM_BACKEND: "qwen_proxy"
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_API_BASE: ${{ secrets.QWEN_API_BASE || 'https://qwen-proxy-bdt6.onrender.com/v1' }}
          QWEN_MODEL: ${{ secrets.QWEN_MODEL || 'qwen3-32b' }}

      - name: Stop API server
        if: always()
        run: |
          cat /tmp/uvicorn-e2e.log || true
          kill $(cat /tmp/uvicorn-e2e.pid) 2>/dev/null || true

      - name: Upload accuracy report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: accuracy-report
          path: accuracy_report.json
          if-no-files-found: ignore

  # ─── Docker build + Trivy CVE scan ──────────────────────────────────────────
  #
  # Security strategy:
  # - Trivy always runs with exit-code=0 and uploads SARIF to Security tab.
  # - A separate "security-gate" step reads the SARIF and fails ONLY when
  #   there are CRITICAL findings WITH an available fix (fixedVersion != "").
  # - OS-level CVE without upstream fix are tracked in TECHNICAL_DEBT.md and
  #   must NOT block CI (ignore-unfixed=true handles this at Trivy level too).
  docker:
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (production target)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          tags: dzo-tz-agents:${{ github.sha }},dzo-tz-agents:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy CVE scan (SARIF upload, no hard fail)
        # exit-code=0: scan always completes so SARIF is always uploaded.
        # Security policy is enforced by the "security-gate" step below.
        # ignore-unfixed: skip CVE where no patched package exists yet.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: dzo-tz-agents:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Security gate — fail on CRITICAL CVE with fix available
        # Policy: only block CI for CRITICAL CVE that have a patched version.
        # HIGH CVE without fix are tracked in GitHub Security tab.
        run: |
          CRITICAL_WITH_FIX=$(python3 - << 'EOF'
          import json, sys

          try:
              with open("trivy-results.sarif") as f:
                  sarif = json.load(f)
          except FileNotFoundError:
              print(0)
              sys.exit(0)

          rules_by_id = {}
          for run in sarif.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  rules_by_id[rule["id"]] = rule

          count = 0
          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  rule_id = result.get("ruleId", "")
                  rule = rules_by_id.get(rule_id, {})
                  props = rule.get("properties", {})
                  # security-severity >= 9.0 → CRITICAL in CVSS
                  score = float(props.get("security-severity", "0"))
                  # fixedVersion is set by Trivy when a patched pkg exists
                  has_fix = bool(props.get("fixedVersion", "").strip())
                  if score >= 9.0 and has_fix:
                      count += 1

          print(count)
          EOF
          )

          echo "CRITICAL CVE with available fix: ${CRITICAL_WITH_FIX}"
          if [ "${CRITICAL_WITH_FIX}" -gt "0" ]; then
            echo "::error::${CRITICAL_WITH_FIX} CRITICAL CVE(s) with available fix detected."
            echo "Update affected packages or add justified entries to .trivyignore"
            exit 1
          fi
          echo "Security gate passed — no CRITICAL CVE with available fix."

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.0
        with:
          image: dzo-tz-agents:${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.spdx.json
          format: spdx-json

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && vars.DOCKER_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && vars.DOCKER_PUSH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dzo-tz-agents:latest
            ${{ secrets.DOCKER_USERNAME }}/dzo-tz-agents:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
