name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Lint ───────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff autofix (safe fixes)
        run: ruff check . --fix --config pyproject.toml
      - name: Lint
        run: ruff check . --config pyproject.toml

  # ─── Tests (matrix) ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Docker build + Trivy CVE scan ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (production target)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          tags: dzo-tz-agents:${{ github.sha }},dzo-tz-agents:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dzo-tz-agents:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: dzo-tz-agents:${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.spdx.json
          format: spdx-json

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && vars.DOCKER_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && vars.DOCKER_PUSH == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dzo-tz-agents:latest
            ${{ secrets.DOCKER_USERNAME }}/dzo-tz-agents:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
