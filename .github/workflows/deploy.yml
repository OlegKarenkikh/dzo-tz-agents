name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:            # ручной запуск из GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []                   # запускается только если CI прошёл (workflow_run не нужен)
    environment: production     # GitHub Environment с required reviewers
    concurrency:
      group: deploy-production
      cancel-in-progress: false # никогда не отменять деплой
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (zero-downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/dzo-tz-agents

            echo "=== [1/5] Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/5] Build new image ==="
            docker build --target production -t dzo-tz-agents:${{ github.sha }} -t dzo-tz-agents:latest .

            echo "=== [3/5] Zero-downtime rolling update ==="
            # Обновляем поочередно: сначала API, потом UI, затем агенты
            docker compose up -d --no-deps --build api
            sleep 10
            docker compose up -d --no-deps --build ui
            sleep 5
            docker compose up -d --no-deps --build agent-dzo agent-tz

            echo "=== [4/5] Healthcheck ==="
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "fail")
              if [ "$STATUS" = "ok" ]; then
                echo "✅ API здоров"
                break
              fi
              echo "⏳ Ожидание ($i/12)..."
              sleep 10
            done
            if [ "$STATUS" != "ok" ]; then
              echo "❌ API не ответил за 2 минуты — rollback"
              docker compose up -d --no-deps --build api
              exit 1
            fi

            echo "=== [5/5] Cleanup old images ==="
            docker image prune -f --filter "until=24h"

            echo "✨ Деплой успешно завершён: $(date)"

      - name: Notify Telegram on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ dzo-tz-agents деплой успешен%0AСоммит: ${{ github.sha }}%0AАвтор: ${{ github.actor }}"

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ dzo-tz-agents деплой НЕ УДАЛСЯ%0AСоммит: ${{ github.sha }}%0AАвтор: ${{ github.actor }}"
