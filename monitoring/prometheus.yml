global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: dzo-tz-agents

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: dzo-tz-api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: nginx
    static_configs:
      - targets: [nginx-exporter:9113]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
