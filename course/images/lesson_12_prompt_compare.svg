<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial" font-size="42" font-weight="700" fill="#0f172a">Плохой vs хороший prompt</text><rect x="120" y="250" width="600" height="450" rx="24" fill="#fee2e2" stroke="#f87171" stroke-width="3"/><text x="300" y="310" font-family="Arial" font-size="34" font-weight="700" fill="#b91c1c">Плохо</text><text x="160" y="380" font-family="Arial" font-size="26" fill="#7f1d1d">"Проверь документ"</text><text x="160" y="430" font-family="Arial" font-size="24" fill="#7f1d1d">• нет роли</text><text x="160" y="470" font-family="Arial" font-size="24" fill="#7f1d1d">• нет структуры</text><text x="160" y="510" font-family="Arial" font-size="24" fill="#7f1d1d">• нет критериев</text><rect x="880" y="250" width="600" height="450" rx="24" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/><text x="1060" y="310" font-family="Arial" font-size="34" font-weight="700" fill="#166534">Хорошо</text><text x="920" y="380" font-family="Arial" font-size="24" fill="#065f46">Ты — инспектор заявок ДЗО...</text><text x="920" y="420" font-family="Arial" font-size="24" fill="#065f46">Проверь по чек-листу...</text><text x="920" y="460" font-family="Arial" font-size="24" fill="#065f46">Верни JSON...</text><text x="920" y="500" font-family="Arial" font-size="24" fill="#065f46">Не придумывай данные...</text></svg>