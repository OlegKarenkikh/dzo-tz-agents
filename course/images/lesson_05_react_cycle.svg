<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">ReAct: цикл работы агента</text><text x="100" y="175" font-family="Arial, sans-serif" font-size="24" fill="#475569">Reason → Act → Observe — как LLM принимает решения и использует инструменты.</text><circle cx="800" cy="480" r="260" fill="#eff6ff" stroke="#93c5fd" stroke-width="4"/><rect x="690" y="250" width="220" height="90" rx="18" fill="#dbeafe"/><text x="740" y="305" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Reason</text><rect x="1040" y="470" width="220" height="90" rx="18" fill="#dbeafe"/><text x="1105" y="525" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Act</text><rect x="690" y="690" width="220" height="90" rx="18" fill="#dbeafe"/><text x="735" y="745" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Observe</text><polygon points="910,300 1030,450 980,470" fill="#60a5fa"/><polygon points="1150,560 920,690 950,630" fill="#60a5fa"/><polygon points="690,690 700,350 760,370" fill="#60a5fa"/><text x="120" y="500" font-family="Consolas, monospace" font-size="26" fill="#334155">Мысль: проверить ТЗ</text><text x="120" y="540" font-family="Consolas, monospace" font-size="26" fill="#334155">Действие: analyze_tz()</text><text x="120" y="580" font-family="Consolas, monospace" font-size="26" fill="#334155">Наблюдение: OK</text><text x="120" y="620" font-family="Consolas, monospace" font-size="26" fill="#334155">→ следующий шаг</text><rect x="1050" y="300" width="420" height="150" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/><text x="1080" y="350" font-family="Arial, sans-serif" font-size="28" fill="#0f172a">LLM не исполняет код</text><text x="1080" y="390" font-family="Arial, sans-serif" font-size="24" fill="#475569">Она выбирает инструмент</text><text x="1080" y="420" font-family="Arial, sans-serif" font-size="24" fill="#475569">по описанию (docstring)</text></svg>