<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial" font-size="42" font-weight="700" fill="#0f172a">Версионирование prompt</text><text x="100" y="175" font-family="Arial" font-size="24" fill="#475569">Как развивать и улучшать поведение агента безопасно.</text><rect x="150" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="200" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">v1</text><rect x="450" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="500" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">v2</text><rect x="750" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="800" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">v3</text><rect x="1050" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="1100" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">prod</text><line x1="350" y1="410" x2="450" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="650" y1="410" x2="750" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="950" y1="410" x2="1050" y2="410" stroke="#60a5fa" stroke-width="6"/><text x="150" y="600" font-family="Arial" font-size="24" fill="#334155">Каждое изменение prompt должно тестироваться и может быть откатано.</text></svg>