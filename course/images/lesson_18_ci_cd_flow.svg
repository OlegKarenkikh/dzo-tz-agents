<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">CI/CD для агентного проекта</text><text x="100" y="175" font-family="Arial, sans-serif" font-size="24" fill="#475569">Проверки должны валидировать не только код, но и поведение агентов.</text><rect x="120" y="340" width="180" height="110" rx="18" fill="#dbeafe"/><text x="165" y="405" font-family="Arial" font-size="26" fill="#1e3a8a">Push</text><rect x="380" y="340" width="220" height="110" rx="18" fill="#dbeafe"/><text x="445" y="405" font-family="Arial" font-size="26" fill="#1e3a8a">Lint</text><rect x="680" y="340" width="220" height="110" rx="18" fill="#dbeafe"/><text x="728" y="405" font-family="Arial" font-size="26" fill="#1e3a8a">Tests</text><rect x="980" y="340" width="220" height="110" rx="18" fill="#dbeafe"/><text x="1010" y="405" font-family="Arial" font-size="26" fill="#1e3a8a">Agent checks</text><rect x="1280" y="340" width="200" height="110" rx="18" fill="#dbeafe"/><text x="1335" y="405" font-family="Arial" font-size="26" fill="#1e3a8a">Deploy</text><line x1="300" y1="395" x2="380" y2="395" stroke="#60a5fa" stroke-width="6"/><line x1="600" y1="395" x2="680" y2="395" stroke="#60a5fa" stroke-width="6"/><line x1="900" y1="395" x2="980" y2="395" stroke="#60a5fa" stroke-width="6"/><line x1="1200" y1="395" x2="1280" y2="395" stroke="#60a5fa" stroke-width="6"/><rect x="380" y="530" width="1100" height="180" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="430" y="590" font-family="Arial" font-size="28" font-weight="700" fill="#1d4ed8">Что важно проверять в агентных проектах</text><text x="430" y="635" font-family="Arial" font-size="24" fill="#334155">• unit: отдельные tools и парсеры</text><text x="430" y="670" font-family="Arial" font-size="24" fill="#334155">• integration: вызовы агента и JSON-формат ответа</text><text x="430" y="705" font-family="Arial" font-size="24" fill="#334155">• behaviour: ограничения prompt, deterministic output, schema validation</text></svg>