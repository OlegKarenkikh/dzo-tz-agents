<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial" font-size="42" font-weight="700" fill="#0f172a">Guardrails: безопасный поток LLM</text><text x="100" y="175" font-family="Arial" font-size="24" fill="#475569">Контроль входа и выхода для предотвращения ошибок и инъекций.</text><rect x="120" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="150" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Input</text><rect x="380" y="350" width="220" height="120" rx="18" fill="#dbeafe"/><text x="400" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Validation</text><rect x="680" y="350" width="220" height="120" rx="18" fill="#dbeafe"/><text x="720" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">LLM</text><rect x="980" y="350" width="260" height="120" rx="18" fill="#dbeafe"/><text x="1000" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Output validation</text><rect x="1300" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="1330" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Safe result</text><line x1="320" y1="410" x2="380" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="600" y1="410" x2="680" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="900" y1="410" x2="980" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="1240" y1="410" x2="1300" y2="410" stroke="#60a5fa" stroke-width="6"/><text x="120" y="600" font-family="Arial" font-size="24" fill="#334155">Проверяем вход → ограничиваем поведение LLM → валидируем выход → возвращаем безопасный результат.</text></svg>