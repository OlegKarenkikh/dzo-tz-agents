<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Архитектура агента (LangGraph)</text><rect x="150" y="350" width="300" height="120" rx="20" fill="#dbeafe"/><text x="230" y="420" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">User</text><rect x="550" y="300" width="500" height="300" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="700" y="350" font-family="Arial" font-size="32" font-weight="700" fill="#1d4ed8">Agent</text><rect x="620" y="380" width="360" height="80" rx="16" fill="#ffffff" stroke="#bfdbfe"/><text x="720" y="430" font-family="Arial" font-size="26" fill="#0f172a">LLM (GPT-4o)</text><rect x="620" y="480" width="360" height="80" rx="16" fill="#ffffff" stroke="#bfdbfe"/><text x="710" y="530" font-family="Arial" font-size="26" fill="#0f172a">Tools</text><rect x="1150" y="350" width="300" height="120" rx="20" fill="#dbeafe"/><text x="1200" y="420" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">External API</text><line x1="450" y1="410" x2="550" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="1050" y1="410" x2="1150" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="800" y1="460" x2="800" y2="480" stroke="#60a5fa" stroke-width="6"/><text x="200" y="650" font-family="Arial" font-size="26" fill="#475569">LLM принимает решение → вызывает tool → получает результат → формирует ответ</text></svg>