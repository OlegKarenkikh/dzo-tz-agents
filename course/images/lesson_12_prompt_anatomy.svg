<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Анатомия хорошего prompt</text><text x="100" y="175" font-family="Arial, sans-serif" font-size="24" fill="#475569">Структура, которая помогает агенту отвечать стабильно и предсказуемо.</text><rect x="120" y="240" width="1360" height="520" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><rect x="160" y="280" width="260" height="90" rx="16" fill="#dbeafe"/><text x="250" y="335" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">1. Роль</text><rect x="470" y="280" width="260" height="90" rx="16" fill="#dbeafe"/><text x="530" y="335" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">2. Контекст</text><rect x="780" y="280" width="260" height="90" rx="16" fill="#dbeafe"/><text x="860" y="335" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">3. Задача</text><rect x="1090" y="280" width="260" height="90" rx="16" fill="#dbeafe"/><text x="1160" y="335" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">4. Правила</text><rect x="160" y="470" width="260" height="90" rx="16" fill="#dbeafe"/><text x="238" y="525" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">5. Формат</text><rect x="470" y="470" width="260" height="90" rx="16" fill="#dbeafe"/><text x="548" y="525" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">6. Примеры</text><rect x="780" y="470" width="260" height="90" rx="16" fill="#dbeafe"/><text x="842" y="525" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">7. Ограничения</text><rect x="1090" y="470" width="260" height="90" rx="16" fill="#dbeafe"/><text x="1158" y="525" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">8. Проверка</text><text x="160" y="655" font-family="Arial" font-size="25" fill="#334155">Хороший prompt не просто «говорит модели что делать», а создаёт рабочий контракт.</text></svg>