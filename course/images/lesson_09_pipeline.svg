<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial" font-size="42" font-weight="700" fill="#0f172a">Pipeline обработки заявки</text><text x="100" y="175" font-family="Arial" font-size="24" fill="#475569">От входящего документа до финального решения агента</text><rect x="120" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="160" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Email</text><rect x="380" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="400" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Parsing</text><rect x="640" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="655" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Validation</text><rect x="900" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="930" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Decision</text><rect x="1160" y="350" width="200" height="120" rx="18" fill="#dbeafe"/><text x="1200" y="420" font-family="Arial" font-size="26" fill="#1e3a8a">Output</text><line x1="320" y1="410" x2="380" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="580" y1="410" x2="640" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="840" y1="410" x2="900" y2="410" stroke="#60a5fa" stroke-width="6"/><line x1="1100" y1="410" x2="1160" y2="410" stroke="#60a5fa" stroke-width="6"/><text x="120" y="600" font-family="Arial" font-size="24" fill="#334155">Каждый шаг может вызывать агента или tool. Например:</text><text x="120" y="640" font-family="Arial" font-size="24" fill="#334155">Validation → TZ Agent, Decision → LLM reasoning, Output → генерация отчёта</text></svg>