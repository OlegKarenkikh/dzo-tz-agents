<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#f8fbff"/><rect x="50" y="50" width="1500" height="800" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="4"/><text x="100" y="130" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">Архитектура проекта: DZO / TZ / Tender / Collector</text><text x="100" y="175" font-family="Arial, sans-serif" font-size="24" fill="#475569">Смешанный уровень: бизнес-поток сверху, техническая логика взаимодействия снизу.</text><rect x="120" y="260" width="220" height="110" rx="18" fill="#dbeafe"/><text x="180" y="325" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">Пользователь</text><rect x="430" y="260" width="220" height="110" rx="18" fill="#dbeafe"/><text x="520" y="325" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">API</text><rect x="740" y="220" width="260" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="825" y="300" font-family="Arial" font-size="30" font-weight="700" fill="#1d4ed8">DZO Agent</text><rect x="1080" y="150" width="260" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="1178" y="230" font-family="Arial" font-size="30" font-weight="700" fill="#1d4ed8">TZ Agent</text><rect x="1080" y="340" width="260" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="1148" y="420" font-family="Arial" font-size="30" font-weight="700" fill="#1d4ed8">Tender Agent</text><rect x="1080" y="530" width="260" height="140" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/><text x="1130" y="610" font-family="Arial" font-size="30" font-weight="700" fill="#1d4ed8">Collector</text><rect x="1360" y="340" width="140" height="140" rx="22" fill="#dbeafe"/><text x="1390" y="420" font-family="Arial" font-size="28" font-weight="700" fill="#1e3a8a">Tools</text><line x1="340" y1="315" x2="430" y2="315" stroke="#60a5fa" stroke-width="6"/><polygon points="430,315 405,302 405,328" fill="#60a5fa"/><line x1="650" y1="315" x2="740" y2="290" stroke="#60a5fa" stroke-width="6"/><polygon points="740,290 713,284 720,310" fill="#60a5fa"/><line x1="1000" y1="265" x2="1080" y2="220" stroke="#60a5fa" stroke-width="6"/><polygon points="1080,220 1052,219 1065,242" fill="#60a5fa"/><line x1="1000" y1="295" x2="1080" y2="390" stroke="#60a5fa" stroke-width="6"/><polygon points="1080,390 1054,378 1074,361" fill="#60a5fa"/><line x1="1000" y1="325" x2="1080" y2="600" stroke="#60a5fa" stroke-width="6"/><polygon points="1080,600 1057,585 1084,577" fill="#60a5fa"/><line x1="1340" y1="410" x2="1360" y2="410" stroke="#60a5fa" stroke-width="6"/><polygon points="1360,410 1337,397 1337,423" fill="#60a5fa"/><rect x="120" y="720" width="1380" height="90" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/><text x="160" y="770" font-family="Arial" font-size="26" fill="#334155">Главная идея: DZO Agent — входная точка. Он может вызывать TZ Agent для анализа ТЗ, Tender Agent — для пакета документов, Collector — для сбора и проверки материалов.</text></svg>