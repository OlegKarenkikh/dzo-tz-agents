version: "3.9"

services:
  agent-dzo:
    build: .
    container_name: agent_dzo_inspector
    env_file: .env
    environment:
      AGENT_MODE: dzo
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  agent-tz:
    build: .
    container_name: agent_tz_inspector
    env_file: .env
    environment:
      AGENT_MODE: tz
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  api:
    build: .
    container_name: dzo_tz_api
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  ui:
    build: .
    container_name: dzo_tz_ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      UI_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

